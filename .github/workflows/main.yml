name: Build Resume from .tex to .pdf

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t resume_builder .

      - name: Run container to build PDF
        run: docker run --name resume_container resume_builder

      - name: Copy PDF from container
        run: docker cp resume_container:/app/CV/cv.pdf .

      - name: Verify PDF
        run: test -f cv.pdf"

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: cv.pdf
